#
# Continuous integration: mirrors the .githooks/pre-commit gate
# (format + analyze + test) so every push and pull request is checked.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: format · analyze · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Show versions
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test the data-pipeline parsers
        run: python3 -m unittest tools.test_parsers
